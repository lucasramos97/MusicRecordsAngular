<h1 class="title">Deleted Music Records</h1>

<div>
    <p-messages [(value)]="msgs"></p-messages>
</div>

<div class="table-top-button">
    <p-button label="Recover Music" (click)="recoverSelectedMusics()" icon="pi pi-refresh"></p-button>
    <p-button label="Come Back" (click)="comeBack()" icon="pi pi-chevron-right" iconPos="right"></p-button>
</div>

<p-table [value]="musics" [(selection)]="musicsSelected" dataKey="id" [lazy]="true" (onLazyLoad)="loadMusics($event)"
    [paginator]="true" [rows]="5" [totalRecords]="totalRecords" [loading]="loading">
    <ng-template pTemplate="header">
        <tr>
            <th style="width: 3rem">
                <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>
            <th style="width: 20%;">Title</th>
            <th style="width: 20%;">Artist</th>
            <th style="width: 15%;">Launch Date</th>
            <th style="width: 15%;">Duration</th>
            <th style="width: 15%;">Views Number</th>
            <th style="width: 5%;">Feat</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-music >
        <tr>
            <td>
                <p-tableCheckbox [value]="music"></p-tableCheckbox>
            </td>
            <td>{{music.title}}</td>
            <td>{{music.artist}}</td>
            <td>{{music.launchDate | launchDate }}</td>
            <td>{{music.duration}} min</td>
            <td>{{music.viewsNumber | currency:'':'':'1.0-0'}}</td>
            <td>{{music.feat | musicFeat}}</td>
        </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage" >
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td [attr.colspan]="musics.length" style="font-weight: bold;">
                No records found!
            </td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </ng-template>
</p-table>

<p-confirmDialog header="Recover Confirmation" icon="pi pi-question-circle" [style]="{width: '50vw'}"
    [baseZIndex]="10000" acceptButtonStyleClass="p-button-success">
</p-confirmDialog>
